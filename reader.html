<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="reader-body">
  <nav class="reader-nav">
    <a href="index.html" class="nav-back" aria-label="Back to book list">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Books
    </a>
    <span id="book-title" class="nav-title"></span>
    <select id="lang-select" class="lang-select" aria-label="Select language"></select>
  </nav>

  <div id="page-container" class="page-container">
    <div class="page-slide" id="page-slide">
      <div class="page-image-wrap" id="page-image-wrap">
        <p class="loading">Loading…</p>
      </div>
      <p class="page-text" id="page-text"></p>
    </div>
  </div>

  <div class="page-counter-bar">
    <span id="page-counter" class="page-counter"></span>
  </div>

  <script src="reader.js"></script>
</body>
</html>
