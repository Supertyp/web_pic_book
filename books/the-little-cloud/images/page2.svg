<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#C8E8FF"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DC96A"/>
      <stop offset="100%" stop-color="#4A8F3A"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="800" fill="url(#sky2)"/>
  <!-- Cloud at top looking down -->
  <circle cx="250" cy="120" r="55" fill="white"/>
  <circle cx="310" cy="95" r="66" fill="white"/>
  <circle cx="375" cy="115" r="55" fill="white"/>
  <circle cx="312" cy="138" r="52" fill="white"/>
  <rect x="205" y="138" width="220" height="52" rx="8" fill="white"/>
  <!-- Cloud eyes (looking down) -->
  <circle cx="290" cy="125" r="7" fill="#5588CC"/>
  <circle cx="335" cy="118" r="7" fill="#5588CC"/>
  <circle cx="292" cy="128" r="3.5" fill="#1A3A70"/>
  <circle cx="337" cy="121" r="3.5" fill="#1A3A70"/>
  <!-- Ground / fields -->
  <rect x="0" y="520" width="600" height="280" fill="url(#field)"/>
  <ellipse cx="300" cy="520" rx="320" ry="50" fill="#8ED87A"/>
  <!-- Field rows (crops) -->
  <line x1="0" y1="560" x2="600" y2="560" stroke="#5A9A4A" stroke-width="3" opacity="0.5"/>
  <line x1="0" y1="590" x2="600" y2="590" stroke="#5A9A4A" stroke-width="3" opacity="0.5"/>
  <line x1="0" y1="620" x2="600" y2="620" stroke="#5A9A4A" stroke-width="3" opacity="0.4"/>
  <!-- Houses -->
  <!-- House 1 -->
  <rect x="80" y="450" width="70" height="55" fill="#E8C88A"/>
  <polygon points="70,450 160,450 115,400" fill="#C44A3A"/>
  <rect x="100" y="468" width="18" height="22" fill="#6A4A2A"/>
  <rect x="122" y="460" width="14" height="14" fill="#A0C8E8"/>
  <!-- House 2 -->
  <rect x="390" y="460" width="80" height="50" fill="#D4B87A"/>
  <polygon points="380,460 480,460 430,405" fill="#A83A2A"/>
  <rect x="412" y="478" width="20" height="24" fill="#5A3A1A"/>
  <rect x="438" y="468" width="16" height="16" fill="#A0C8E8"/>
  <!-- Small house 3 -->
  <rect x="500" y="470" width="55" height="42" fill="#C8A870"/>
  <polygon points="492,470 562,470 527,430" fill="#8A2A1A"/>
  <!-- Path/road -->
  <path d="M 250 800 Q 280 650 300 520" stroke="#C8A858" stroke-width="18" fill="none" opacity="0.6"/>
  <!-- Cloud shadow on field -->
  <ellipse cx="310" cy="530" rx="120" ry="22" fill="#00000015"/>
</svg>
