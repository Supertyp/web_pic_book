<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AA0E0"/>
      <stop offset="100%" stop-color="#D8F0FF"/>
    </linearGradient>
    <linearGradient id="ground3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ED47A"/>
      <stop offset="100%" stop-color="#5A9A4A"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="800" fill="url(#sky3)"/>
  <!-- Ground -->
  <rect x="0" y="580" width="600" height="220" fill="url(#ground3)"/>
  <ellipse cx="300" cy="580" rx="330" ry="50" fill="#A0DC8A"/>
  <!-- Flowers on ground -->
  <g>
    <!-- flower stems -->
    <line x1="100" y1="580" x2="100" y2="620" stroke="#4A8A2A" stroke-width="3"/>
    <line x1="180" y1="578" x2="180" y2="615" stroke="#4A8A2A" stroke-width="3"/>
    <line x1="260" y1="576" x2="260" y2="612" stroke="#4A8A2A" stroke-width="3"/>
    <line x1="340" y1="578" x2="340" y2="615" stroke="#4A8A2A" stroke-width="3"/>
    <line x1="420" y1="580" x2="420" y2="620" stroke="#4A8A2A" stroke-width="3"/>
    <line x1="500" y1="578" x2="500" y2="614" stroke="#4A8A2A" stroke-width="3"/>
    <!-- Flower heads - wilted/drooping (thirsty) -->
    <circle cx="100" cy="575" r="12" fill="#FFB3C8" opacity="0.7"/>
    <circle cx="100" cy="575" r="6" fill="#FF8FAA"/>
    <circle cx="180" cy="572" r="11" fill="#FFD0A0" opacity="0.7"/>
    <circle cx="180" cy="572" r="5.5" fill="#FFB070"/>
    <circle cx="260" cy="570" r="13" fill="#FF9EC0" opacity="0.7"/>
    <circle cx="260" cy="570" r="6.5" fill="#FF6A9A"/>
    <circle cx="340" cy="572" r="11" fill="#FFD066" opacity="0.7"/>
    <circle cx="340" cy="572" r="5.5" fill="#FFBB33"/>
    <circle cx="420" cy="575" r="12" fill="#C8A0FF" opacity="0.7"/>
    <circle cx="420" cy="575" r="6" fill="#A870FF"/>
    <circle cx="500" cy="571" r="11" fill="#FFB3C8" opacity="0.7"/>
    <circle cx="500" cy="571" r="5.5" fill="#FF8FAA"/>
  </g>
  <!-- Cloud descending — lower in frame, slightly larger -->
  <g transform="translate(0, 60)">
    <circle cx="210" cy="330" r="65" fill="white"/>
    <circle cx="292" cy="298" r="80" fill="white"/>
    <circle cx="378" cy="322" r="65" fill="white"/>
    <circle cx="293" cy="355" r="62" fill="white"/>
    <rect x="158" y="360" width="268" height="62" rx="8" fill="white"/>
    <!-- Cloud shadow -->
    <ellipse cx="290" cy="415" rx="132" ry="15" fill="#BACEDF" opacity="0.35"/>
    <!-- Curious face -->
    <circle cx="268" cy="338" r="7" fill="#5588CC"/>
    <circle cx="316" cy="330" r="7" fill="#5588CC"/>
    <circle cx="270" cy="341" r="3.5" fill="#1A3A70"/>
    <circle cx="318" cy="333" r="3.5" fill="#1A3A70"/>
    <!-- small smile -->
    <path d="M 278 358 Q 292 368 308 358" stroke="#88AACC" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Motion dots showing cloud moving down -->
  <circle cx="292" cy="170" r="5" fill="white" opacity="0.5"/>
  <circle cx="292" cy="200" r="4" fill="white" opacity="0.4"/>
  <circle cx="292" cy="226" r="3" fill="white" opacity="0.3"/>
</svg>
