<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2255A0"/>
      <stop offset="45%" stop-color="#5090D8"/>
      <stop offset="100%" stop-color="#C8E8FF"/>
    </linearGradient>
    <linearGradient id="ground5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88D070"/>
      <stop offset="100%" stop-color="#4A8A38"/>
