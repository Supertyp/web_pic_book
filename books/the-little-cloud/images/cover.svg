<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A7BD5"/>
      <stop offset="100%" stop-color="#B8DEFF"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6DBF59"/>
      <stop offset="100%" stop-color="#3E8A2E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="600" height="800" fill="url(#sky)"/>
  <!-- Sun glow -->
  <circle cx="490" cy="105" r="90" fill="#FFE066" opacity="0.35"/>
  <!-- Sun -->
  <circle cx="490" cy="105" r="58" fill="#FFD700"/>
  <circle cx="490" cy="105" r="44" fill="#FFB800"/>
  <!-- Cloud shadow -->
  <ellipse cx="300" cy="420" rx="170" ry="22" fill="#00000018"/>
  <!-- Cloud body -->
  <circle cx="220" cy="330" r="72" fill="white"/>
  <circle cx="300" cy="295" r="90" fill="white"/>
  <circle cx="385" cy="325" r="72" fill="white"/>
  <circle cx="300" cy="360" r="68" fill="white"/>
  <rect x="155" y="345" width="295" height="70" rx="8" fill="white"/>
  <!-- Cloud shading -->
  <ellipse cx="260" cy="395" rx="115" ry="12" fill="#E0EEFF" opacity="0.5"/>
  <!-- Hills -->
  <ellipse cx="0" cy="740" rx="280" ry="200" fill="#5EAF4A"/>
  <ellipse cx="300" cy="780" rx="380" ry="180" fill="url(#hill)"/>
  <ellipse cx="620" cy="750" rx="260" ry="190" fill="#4E9F3A"/>
  <!-- Small flowers -->
  <circle cx="80" cy="695" r="8" fill="#FF6B9D"/>
  <circle cx="100" cy="688" r="6" fill="#FF9ECD"/>
  <circle cx="150" cy="700" r="9" fill="#FFD700"/>
  <circle cx="420" cy="710" r="8" fill="#FF6B9D"/>
  <circle cx="500" cy="700" r="7" fill="#FF9ECD"/>
  <circle cx="540" cy="695" r="9" fill="#FF6B9D"/>
  <!-- Title panel -->
  <rect x="55" y="590" width="490" height="130" rx="18" fill="white" opacity="0.82"/>
  <text x="300" y="648" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="46" fill="#2A5CA8" font-weight="bold">The Little Cloud</text>
  <text x="300" y="695" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#6688BB">a story about giving</text>
</svg>
