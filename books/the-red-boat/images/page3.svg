<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="storm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="60%" stop-color="#2A3A5A"/>
      <stop offset="100%" stop-color="#3A4A6A"/>
    </linearGradient>
    <linearGradient id="stormSea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A5A"/>
      <stop offset="100%" stop-color="#080C18"/>
    </linearGradient>
  </defs>
  <!-- Dark stormy sky -->
  <rect width="600" height="800" fill="url(#storm)"/>
  <!-- Storm clouds -->
  <g opacity="0.9">
    <circle cx="80" cy="80" r="70" fill="#2A2A3A"/>
    <circle cx="150" cy="55" r="85" fill="#252535"/>
    <circle cx="240" cy="75" r="70" fill="#2A2A3A"/>
    <circle cx="185" cy="108" r="64" fill="#202030"/>
    <rect x="30" y="100" width="278" height="60" fill="#202030"/>
  </g>
  <g opacity="0.85">
    <circle cx="340" cy="90" r="65" fill="#282838"/>
    <circle cx="415" cy="62" r="80" fill="#232333"/>
    <circle cx="505" cy="85" r="65" fill="#282838"/>
    <circle cx="418" cy="118" r="60" fill="#1E1E2E"/>
    <rect x="298" y="112" width="270" height="56" fill="#1E1E2E"/>
  </g>
  <!-- Additional lower clouds -->
  <g opacity="0.8">
    <circle cx="60" cy="200" r="60" fill="#1A1A2A"/>
    <circle cx="130" cy="178" r="72" fill="#181828"/>
    <circle cx="208" cy="196" r="60" fill="#1A1A2A"/>
    <rect x="18" y="206" width="248" height="52" fill="#181828"/>
    <circle cx="380" cy="210" r="58" fill="#1A1A2A"/>
    <circle cx="448" cy="188" r="70" fill="#181828"/>
    <circle cx="524" cy="206" r="58" fill="#1A1A2A"/>
    <rect x="340" y="214" width="240" height="50" fill="#181828"/>
  </g>
  <!-- Lightning -->
  <polyline points="420,158 400,230 416,230 392,310" stroke="#FFE566" stroke-width="3" fill="none" opacity="0.9"/>
  <polyline points="420,158 400,230 416,230 392,310" stroke="white" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Rain lines -->
  <g stroke="#88AACCAA" stroke-width="1.5" stroke-linecap="round">
    <line x1="40" y1="280" x2="25" y2="330"/>
    <line x1="80" y1="265" x2="65" y2="315"/>
    <line x1="120" y1="272" x2="105" y2="322"/>
    <line x1="160" y1="260" x2="145" y2="310"/>
    <line x1="200" y1="270" x2="185" y2="320"/>
    <line x1="240" y1="258" x2="225" y2="308"/>
    <line x1="280" y1="268" x2="265" y2="318"/>
    <line x1="320" y1="262" x2="305" y2="312"/>
    <line x1="360" y1="272" x2="345" y2="322"/>
    <line x1="400" y1="260" x2="385" y2="310"/>
    <line x1="440" y1="270" x2="425" y2="320"/>
    <line x1="480" y1="258" x2="465" y2="308"/>
    <line x1="520" y1="266" x2="505" y2="316"/>
    <line x1="560" y1="260" x2="545" y2="310"/>
    <line x1="60" y1="320" x2="45" y2="370"/>
    <line x1="100" y1="312" x2="85" y2="362"/>
    <line x1="140" y1="318" x2="125" y2="368"/>
    <line x1="180" y1="308" x2="165" y2="358"/>
    <line x1="220" y1="315" x2="205" y2="365"/>
    <line x1="260" y1="310" x2="245" y2="360"/>
    <line x1="300" y1="318" x2="285" y2="368"/>
    <line x1="340" y1="308" x2="325" y2="358"/>
    <line x1="380" y1="315" x2="365" y2="365"/>
    <line x1="420" y1="312" x2="405" y2="362"/>
    <line x1="460" y1="318" x2="445" y2="368"/>
    <line x1="500" y1="308" x2="485" y2="358"/>
    <line x1="540" y1="314" x2="525" y2="364"/>
    <line x1="580" y1="308" x2="565" y2="358"/>
  </g>
  <!-- Stormy sea -->
  <rect x="0" y="440" width="600" height="360" fill="url(#stormSea)"/>
  <!-- Big waves -->
  <path d="M -20 445 Q 50 420 120 445 Q 190 470 260 445 Q 330 420 400 445 Q 470 470 540 445 Q 575 432 620 450" stroke="#2A5A8A" stroke-width="28" fill="none"/>
  <path d="M -20 480 Q 60 458 140 480 Q 220 502 300 480 Q 380 458 460 480 Q 530 498 620 482" stroke="#1E4A7A" stroke-width="24" fill="none"/>
  <path d="M -20 520 Q 70 498 155 520 Q 240 542 320 520 Q 400 498 480 520 Q 545 540 620 522" stroke="#183A64" stroke-width="22" fill="none"/>
  <!-- Wave white tops -->
  <path d="M -20 445 Q 50 420 120 445" stroke="white" stroke-width="4" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M 260 445 Q 330 420 400 445" stroke="white" stroke-width="4" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M 130 482 Q 195 462 265 482" stroke="white" stroke-width="3.5" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M 360 480 Q 420 460 490 480" stroke="white" stroke-width="3.5" fill="none" opacity="0.45" stroke-linecap="round"/>
  <!-- Red boat tossed in waves -->
  <g transform="translate(185, 418) rotate(-12, 100, 40)">
    <path d="M 6 40 Q 80 12 154 40 L 138 66 Q 80 76 18 66 Z" fill="#CC2222"/>
    <path d="M 18 66 Q 80 76 138 66 L 143 75 Q 80 88 13 75 Z" fill="#991111"/>
    <rect x="50" y="14" width="56" height="32" rx="5" fill="#F0E0C0"/>
    <rect x="55" y="19" width="17" height="14" fill="#88BBDD" opacity="0.85"/>
    <rect x="76" y="19" width="17" height="14" fill="#88BBDD" opacity="0.85"/>
    <line x1="84" y1="14" x2="84" y2="-48" stroke="#8A6030" stroke-width="4.5"/>
    <path d="M 84 -45 L 84 7 L 148 -20 Z" fill="white" opacity="0.85"/>
    <path d="M 84 -48 L 108 -38 L 84 -28 Z" fill="#CC2222"/>
  </g>
</svg>
