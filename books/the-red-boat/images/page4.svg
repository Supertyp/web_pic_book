<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="sky4b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2A4A"/>
      <stop offset="50%" stop-color="#3A5A8A"/>
      <stop offset="100%" stop-color="#5A80B0"/>
    </linearGradient>
    <linearGradient id="sea4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A4070"/>
      <stop offset="100%" stop-color="#0A1828"/>
    </linearGradient>
  </defs>
  <!-- Sky clearing somewhat -->
  <rect width="600" height="800" fill="url(#sky4b)"/>
  <!-- Breaking clouds — lighter on right side -->
  <g opacity="0.85">
    <circle cx="50" cy="100" r="65" fill="#1A2030"/>
    <circle cx="120" cy="76" r="78" fill="#161C2A"/>
    <circle cx="205" cy="96" r="65" fill="#1A2030"/>
    <rect x="8" y="108" width="255" height="55" fill="#161C2A"/>
  </g>
  <g opacity="0.6">
    <circle cx="350" cy="120" r="55" fill="#2A3A54"/>
    <circle cx="415" cy="96" r="68" fill="#253042"/>
    <circle cx="490" cy="114" r="55" fill="#2A3A54"/>
    <rect x="315" y="128" width="228" height="50" fill="#25303E"/>
  </g>
  <!-- Break of light right -->
  <path d="M 600 0 L 600 300 L 350 0 Z" fill="#4A7AAA" opacity="0.25"/>
  <path d="M 600 0 L 600 200 L 450 0 Z" fill="#6A9ACA" opacity="0.2"/>
  <!-- Lighter patch in sky -->
  <ellipse cx="520" cy="80" rx="120" ry="60" fill="#4A78AA" opacity="0.3"/>
  <!-- Rain still falling but lighter -->
  <g stroke="#88AACCAA" stroke-width="1.2" stroke-linecap="round" opacity="0.5">
    <line x1="50" y1="280" x2="37" y2="325"/>
    <line x1="100" y1="268" x2="87" y2="313"/>
    <line x1="150" y1="274" x2="137" y2="319"/>
    <line x1="200" y1="262" x2="187" y2="307"/>
    <line x1="250" y1="270" x2="237" y2="315"/>
    <line x1="300" y1="260" x2="287" y2="305"/>
    <line x1="350" y1="266" x2="337" y2="311"/>
  </g>
  <!-- Rough sea -->
  <rect x="0" y="430" width="600" height="370" fill="url(#sea4)"/>
  <!-- Large waves -->
  <path d="M -20 440 Q 70 416 160 440 Q 250 464 340 440 Q 430 416 520 440 Q 572 454 640 438" stroke="#1A4878" stroke-width="30" fill="none"/>
  <path d="M -20 480 Q 80 458 170 480 Q 260 502 350 480 Q 440 458 530 480 Q 570 492 640 476" stroke="#142C56" stroke-width="26" fill="none"/>
  <path d="M -20 525 Q 80 504 172 525 Q 264 546 356 525 Q 448 504 540 525 Q 572 538 640 522" stroke="#0E2040" stroke-width="22" fill="none"/>
  <!-- Wave crests — white but smaller than page3 -->
  <path d="M 15 442 Q 80 424 148 442" stroke="white" stroke-width="3.5" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M 330 442 Q 400 424 468 442" stroke="white" stroke-width="3.5" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M 130 482 Q 188 465 248 482" stroke="white" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M 380 480 Q 438 463 498 480" stroke="white" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>
  <!-- Red boat holding on — upright, showing resilience -->
  <g transform="translate(172, 400)">
    <path d="M 8 42 Q 90 12 172 42 L 155 70 Q 90 82 22 70 Z" fill="#CC2222"/>
    <path d="M 22 70 Q 90 82 155 70 L 160 80 Q 90 94 17 80 Z" fill="#991111"/>
    <rect x="58" y="13" width="64" height="35" rx="5" fill="#F0E0C0"/>
    <rect x="63" y="18" width="19" height="16" fill="#88BBDD" opacity="0.85"/>
    <rect x="86" y="18" width="19" height="16" fill="#88BBDD" opacity="0.85"/>
    <!-- Mast straight and strong -->
    <line x1="96" y1="13" x2="96" y2="-55" stroke="#8A6030" stroke-width="5"/>
    <!-- Sail partly furled but holding -->
    <path d="M 96 -52 L 96 6 L 160 -24 Z" fill="white" opacity="0.88"/>
    <path d="M 96 -48 L 96 -15 L 36 -34 Z" fill="#F0E0C0" opacity="0.7"/>
    <path d="M 96 -55 L 120 -46 L 96 -36 Z" fill="#CC2222"/>
    <!-- Spray around bow -->
    <path d="M 8 42 Q -10 35 -18 48" stroke="white" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 14 55 Q -5 50 -12 62" stroke="white" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  </g>
  <!-- Small break of light behind boat -->
  <ellipse cx="300" cy="370" rx="80" ry="30" fill="#6A9ACA" opacity="0.18"/>
</svg>
