<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="sky2b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A4A8A"/>
      <stop offset="100%" stop-color="#4A88CC"/>
    </linearGradient>
    <linearGradient id="sea2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E6AAA"/>
      <stop offset="100%" stop-color="#0A2850"/>
    </linearGradient>
    <linearGradient id="cliff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A7060"/>
      <stop offset="100%" stop-color="#6A5040"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="800" fill="url(#sky2b)"/>
  <!-- Clouds -->
  <g opacity="0.7">
    <circle cx="120" cy="100" r="40" fill="white"/>
    <circle cx="160" cy="82" r="50" fill="white"/>
    <circle cx="204" cy="98" r="40" fill="white"/>
    <rect x="88" y="105" width="148" height="38" rx="6" fill="white"/>
  </g>
  <g opacity="0.6">
    <circle cx="420" cy="130" r="32" fill="white"/>
    <circle cx="455" cy="114" r="40" fill="white"/>
    <circle cx="492" cy="128" r="32" fill="white"/>
    <rect x="394" y="134" width="120" height="30" rx="5" fill="white"/>
  </g>
  <!-- Rocky cliffs right side -->
  <polygon points="440,0 600,0 600,420 500,360 440,300 400,380 380,420" fill="url(#cliff)"/>
  <polygon points="480,0 600,0 600,380 540,320 480,260 460,350" fill="#9A8070"/>
  <!-- Cliff texture lines -->
  <line x1="500" y1="50" x2="490" y2="180" stroke="#6A5040" stroke-width="2" opacity="0.4"/>
  <line x1="540" y1="30" x2="525" y2="200" stroke="#6A5040" stroke-width="1.5" opacity="0.3"/>
  <line x1="570" y1="20" x2="558" y2="160" stroke="#6A5040" stroke-width="1.5" opacity="0.3"/>
  <!-- Sea -->
  <rect x="0" y="380" width="600" height="420" fill="url(#sea2)"/>
  <!-- Wave lines -->
  <path d="M 0 400 Q 70 388 140 400 Q 210 412 280 400 Q 350 388 420 400 Q 490 412 600 400" stroke="#FFFFFF28" stroke-width="3" fill="none"/>
  <path d="M 0 430 Q 80 418 165 432 Q 250 446 330 432 Q 410 418 490 432 Q 545 444 600 430" stroke="#FFFFFF20" stroke-width="2.5" fill="none"/>
  <path d="M 0 465 Q 90 455 180 467 Q 270 479 360 467 Q 450 455 540 467 Q 570 473 600 465" stroke="#FFFFFF18" stroke-width="2" fill="none"/>
  <path d="M 0 510 Q 75 500 155 512 Q 235 524 315 512 Q 395 500 475 512 Q 540 522 600 510" stroke="#FFFFFF14" stroke-width="2" fill="none"/>
  <!-- Red boat small on open sea -->
  <g transform="translate(80, 358)">
    <path d="M 6 32 Q 65 8 124 32 L 112 54 Q 65 62 14 54 Z" fill="#CC2222"/>
    <path d="M 14 54 Q 65 62 112 54 L 116 62 Q 65 72 10 62 Z" fill="#991111"/>
    <rect x="40" y="9" width="44" height="28" rx="4" fill="#F0E0C0"/>
    <rect x="44" y="13" width="13" height="12" fill="#88BBDD" opacity="0.85"/>
    <rect x="60" y="13" width="13" height="12" fill="#88BBDD" opacity="0.85"/>
    <line x1="66" y1="9" x2="66" y2="-40" stroke="#8A6030" stroke-width="4"/>
    <path d="M 66 -38 L 66 4 L 118 -18 Z" fill="white" opacity="0.9"/>
    <path d="M 66 -38 L 66 4 L 14 -12 Z" fill="#F8E8D0" opacity="0.75"/>
    <path d="M 66 -40 L 88 -33 L 66 -24 Z" fill="#CC2222"/>
  </g>
  <!-- Seagulls over sea -->
  <path d="M 230 280 Q 248 268 266 280" stroke="#CCDDEE" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 280 255 Q 295 245 310 255" stroke="#CCDDEE" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 190 310 Q 203 301 216 310" stroke="#CCDDEE" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
